<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container">
        <h1>Signup</h1>

        <input type="text" id="username" placeholder="Username" autocomplete="username"><br><br>
        <input type="password" id="password" placeholder="Password" autocomplete="new-password"><br><br>

        <button onclick="signup()">Signup</button>

        <p>Already have an account? <a href="login.html">Login</a></p>

        <div id="messageBox"></div>
    </div>

    <script src="./js/auth.js"></script>
</body>

</html>
